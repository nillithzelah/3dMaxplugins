<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="./css/style.css" type="text/css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">
    <title>PS风格面板</title>
</head>
<body>
    <div class="ps-panel">
        <div class="ps-tabs">
            <div class="ps-tab active" data-tab="tab1">室内设计</div>
            <div class="ps-tab" data-tab="tab2">建筑规划</div>
            <div class="ps-tab" data-tab="tab3">景观设计</div>
            <div class="ps-tab" data-tab="tab4">图像处理</div>
        </div>
        <div class="ps-content">
            <div class="ps-section tab-content" id="tab1-content" style="display:block;">
                <label for="ps-select1" class="ps-label">室内设计选项：</label>
                <select id="ps-select1" class="ps-select">
                    <option value="1">彩平图</option>
                    <option value="2">毛坯房出图</option>
                    <option value="3">线稿出图</option>
                    <option value="4">白模渲染</option>
                    <option value="7">多风格（白模）</option>
                    <option value="8">多风格（线稿）</option>
                    <option value="9">风格转换</option>
                    <option value="10">360出图</option>
                </select>
            </div>
            <div class="ps-section tab-content" id="tab2-content" style="display:none;">
                <label for="ps-select2" class="ps-label">建筑规划选项：</label>
                <select id="ps-select2" class="ps-select">
                    <option value="1">彩平图</option>
                    <option value="2">现场出图</option>
                    <option value="3">线稿出图</option>
                    <option value="4">白模透视（精确）</option>
                    <option value="5">白模透视（体块）</option>
                    <option value="6">白模鸟瞰（精确）</option>
                    <option value="7">白模鸟瞰（体块）</option>
                    <option value="8">白天变夜景</option>
                    <option value="9">亮化工程</option>
                </select>
            </div>
            <div class="ps-section tab-content" id="tab3-content" style="display:none;">
                <label for="ps-select3" class="ps-label">景观设计选项：</label>
                <select id="ps-select3" class="ps-select">
                    <option value="1">彩平图</option>
                    <option value="2">现场出图</option>
                    <option value="3">现场（局部）参考局部</option>
                    <option value="4">线稿出图</option>
                    <option value="5">白模（透视）</option>
                    <option value="6">白模（鸟瞰）</option>
                    <option value="7">白天转夜景</option>
                    <option value="8">亮化工程</option>
                </select>
            </div>
            <div class="ps-section tab-content" id="tab4-content" style="display:none;">
                <label for="ps-select4" class="ps-label">图像处理选项：</label>
                <select id="ps-select4" class="ps-select">
                    <option value="1">指定换材质</option>
                    <option value="2">修改局部</option>
                    <option value="3">AI去除万物</option>
                    <option value="4">AI去水印</option>
                    <option value="5">增加物体</option>
                    <option value="6">增加物体（指定物体）</option>
                    <option value="7">替换（产品）</option>
                    <option value="8">替换（背景天花）</option>
                    <option value="9">扩图</option>
                    <option value="10">洗图</option>
                    <option value="11">图像增强</option>
                    <option value="12">溶图（局部）</option>
                    <option value="13">放大出图</option>
                    <option value="14">老照片修复</option>
                </select>
            </div>
            <div id="ps-dynamic-content"></div>
        </div>
        <div class="ps-footer" id="ps-footer-content">
            <div id="ps-footer-btn"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
    <script>
// 1. tab与下拉选项切换逻辑
// 2. renderFooter函数根据tab和下拉选项动态渲染footer区块，结构、内容、顺序与PS面板一一对应
// 3. 上传区、提示词区、高级参数区、特殊case等全部同步
// 4. 交互细节如二选一切换、滑块、按钮等全部同步
// 5. 保持UI风格和控件样式一致
document.addEventListener('DOMContentLoaded', function() {
    var tabs = document.querySelectorAll('.ps-tab');
    var tabContents = document.querySelectorAll('.tab-content');
    var tabNames = ['室内', '建筑', '景观', '图像'];
    function renderFooter(idx, text) {
        var footer = document.getElementById('ps-footer-content');
        // 室内-360出图：仅按钮
        if(idx === 0 && text === '360出图') {
            footer.style.marginTop = '32px';
            footer.innerHTML =
              '<div class="footer-title" style="font-size:22px;margin-bottom:32px;">室内-360出图</div>' +
              // 空上传区，高度120px，保持和其它分支一致
              '<div class="ps-form-block upload-section" style="margin-bottom:16px;max-width:340px;min-width:260px;height:120px;visibility:hidden;"></div>' +
              '<div class="ps-form-block" style="margin-top:32px;text-align:center;">' +
              '  <button class="ps-generate-btn" style="width:100%;max-width:320px;min-width:180px;margin:0 auto;display:block;">立即生成 ✨</button>' +
              '</div>';
            return;
        }
        // 图像处理-AI去除万物、AI去水印、图像增强、放大出图：仅按钮
        if(idx === 3 && (text === 'AI去除万物' || text === 'AI去水印' || text === '图像增强' || text === '放大出图' || text === '老照片修复')) {
            footer.style.marginTop = '32px';
            footer.innerHTML =
              '<div class="footer-title" style="font-size:22px;margin-bottom:32px;">图像-' + text + '</div>' +
              '<div class="ps-form-block" style="margin-top:32px;text-align:center;">' +
              '  <button class="ps-generate-btn" style="width:100%;max-width:320px;min-width:180px;margin:0 auto;display:block;">立即生成 ✨</button>' +
              '</div>';
            return;
        }
        // 图像处理-扩图：仅数值输入+按钮，无高参、无上传区
        if(idx === 3 && text === '扩图') {
            footer.style.marginTop = '32px';
            footer.innerHTML =
              '<div class="footer-title" style="font-size:22px;margin-bottom:32px;">图像-扩图</div>' +
              '<div class="ps-form-block" style="margin-bottom:16px;max-width:340px;min-width:260px;">' +
              '  <label class="ps-form-label">扩展像素</label>' +
              '  <input type="number" class="ps-form-input" id="expandPixelInput" value="200" min="1" step="1" style="width:100%;margin-top:6px;">' +
              '</div>' +
              '<div class="ps-form-block" style="margin-top:32px;text-align:center;">' +
              '  <button class="ps-generate-btn" style="width:100%;max-width:320px;min-width:180px;margin:0 auto;display:block;">立即生成 ✨</button>' +
              '</div>';
            return;
        }
        // 图像处理-溶图（局部）：2个参考图像上传区+提示词+高级参数+按钮
        if(idx === 3 && text === '溶图（局部）') {
            footer.style.marginTop = '32px';
            footer.innerHTML =
              '<div class="footer-title" style="font-size:22px;margin-bottom:32px;">图像-溶图（局部）</div>' +
              // 第一个参考图像上传区
              '<div class="ps-form-block upload-section" style="margin-bottom:16px;max-width:340px;min-width:260px;">' +
              '  <div class="upload-header" style="font-size:16px;margin-bottom:8px;">原始图像' +
              '    <span class="upload-switch" style="float:right;">' +
              '      <button class="switch-btn active" id="customRefBtn1">自定义参考图</button>' +
              '      <button class="switch-btn" id="libRefBtn1">参考图片库</button>' +
              '    </span>' +
              '  </div>' +
              '  <div class="upload-box" style="background:#181818;border:1.5px dashed #444;border-radius:6px;min-height:120px;display:flex;align-items:center;justify-content:center;">' +
              '    <input type="file" id="uploadInput1" style="display:none;" accept="image/*">' +
              '    <div class="upload-placeholder" id="uploadPlaceholder1" style="text-align:center;width:100%;padding:18px 0;">' +
              '      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;">' +
              '        <span style="font-size:40px;color:#8fa0ff;">📷</span>' +
              '        <span style="font-size:16px;color:#aaa;">拖放文件到此处上传</span>' +
              '        <span style="font-size:13px;color:#666;">或点击选择文件</span>' +
              '      </div>' +
              '    </div>' +
              '  </div>' +
              '</div>' +
              // 第二个参考图像上传区
              '<div class="ps-form-block upload-section" style="margin-bottom:16px;max-width:340px;min-width:260px;">' +
              '  <div class="upload-header" style="font-size:16px;margin-bottom:8px;">参考图像' +
              '    <span class="upload-switch" style="float:right;">' +
              '      <button class="switch-btn active" id="customRefBtn2">自定义参考图</button>' +
              '      <button class="switch-btn" id="libRefBtn2">参考图片库</button>' +
              '    </span>' +
              '  </div>' +
              '  <div class="upload-box" style="background:#181818;border:1.5px dashed #444;border-radius:6px;min-height:120px;display:flex;align-items:center;justify-content:center;">' +
              '    <input type="file" id="uploadInput2" style="display:none;" accept="image/*">' +
              '    <div class="upload-placeholder" id="uploadPlaceholder2" style="text-align:center;width:100%;padding:18px 0;">' +
              '      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;">' +
              '        <span style="font-size:40px;color:#8fa0ff;">📷</span>' +
              '        <span style="font-size:16px;color:#aaa;">拖放文件到此处上传</span>' +
              '        <span style="font-size:13px;color:#666;">或点击选择文件</span>' +
              '      </div>' +
              '    </div>' +
              '  </div>' +
              '</div>' +
              // 提示词
              '<div class="ps-form-block" style="margin-bottom:16px;max-width:340px;min-width:260px;">' +
              '  <label class="ps-form-label" for="promptInput">提示词</label>' +
              '  <input type="text" class="ps-form-input" id="promptInput" value="溶图（局部）" style="width:100%;margin-top:6px;">' +
              '</div>' +
              // 控制强度
              '<div class="ps-form-block" id="strengthBlock" style="margin-bottom:16px;">' +
              '  <label class="ps-form-label">控制强度</label>' +
              '  <div class="ps-slider-row">' +
              '    <span class="ps-slider-label">弱</span>' +
              '    <div class="my-slider" id="strengthSlider"></div>' +
              '    <span class="ps-slider-label">强</span>' +
              '    <input type="text" class="ps-slider-value" id="sliderValue" value="0.55">' +
              '  </div>' +
              '</div>' +
              // 高级参数
              '<div class="ps-form-block" style="margin-bottom:16px;">' +
              '  <div class="ps-advance-row" style="display:flex;align-items:center;gap:8px;">' +
              '    <label class="ps-form-label" style="font-weight:bold;margin-bottom:6px;">高级参数设置</label>' +
              '    <button class="ps-advance-btn" id="advanceBtn"></button>' +
              '  </div>' +
              '  <div id="advancePanelContainer" style="display:none;margin-top:8px;padding:12px 8px;background:#222;border-radius:6px;"></div>' +
              '</div>' +
              // 生成按钮
              '<div class="ps-form-block" style="margin-top:32px;text-align:center;">' +
              '  <button class="ps-generate-btn" style="width:100%;max-width:320px;min-width:180px;margin:0 auto;display:block;">立即生成 ✨</button>' +
              '</div>';
            setTimeout(function() {
                initFooterSliders();
                initAllUploadAreas();
                // 初始化高级参数展开逻辑
                var btn = document.getElementById('advanceBtn');
                var panel = document.getElementById('advancePanelContainer');
                if(btn && panel) {
                    btn.onclick = function() {
                        if(panel.style.display === 'none') {
                            panel.style.display = 'block';
                            btn.innerText = '▼';
                            btn.classList.add('open');
                            // 高级参数内容
                            panel.innerHTML = "<div class='ps-advance-panel' id='ps-advance-panel'>" +
                              "<div class='ps-advance-title'>参考图权重</div>" +
                              "<div class='advance-slider-row' id='advanceStrengthBlock1'>" +
                              "<span class='ps-slider-label'>弱</span>" +
                              "<div class='my-slider advance-my-slider' id='refWeightSlider'></div>" +
                              "<span class='ps-slider-label'>强</span>" +
                              "<input type='text' class='advance-slider-value' id='refWeightValue' value='0.8'>" +
                              "</div>" +
                              "<div class='ps-advance-title'>控制开始时间</div>" +
                              "<div class='advance-slider-row' id='advanceStrengthBlock2'>" +
                              "<span class='ps-slider-label'>弱</span>" +
                              "<div class='my-slider advance-my-slider' id='startTimeSlider'></div>" +
                              "<span class='ps-slider-label'>强</span>" +
                              "<input type='text' class='advance-slider-value' id='startTimeValue' value='0'>" +
                              "</div>" +
                              "<div class='ps-advance-title'>控制结束时间</div>" +
                              "<div class='advance-slider-row' id='advanceStrengthBlock3'>" +
                              "<span class='ps-slider-label'>弱</span>" +
                              "<div class='my-slider advance-my-slider' id='endTimeSlider'></div>" +
                              "<span class='ps-slider-label'>强</span>" +
                              "<input type='text' class='advance-slider-value' id='endTimeValue' value='1'>" +
                              "</div>" +
                              "</div>";
                            // 展开后立即初始化高级参数滑块
                            var advSliders = [
                              ['refWeightSlider', 'refWeightValue', 0.8],
                              ['startTimeSlider', 'startTimeValue', 0],
                              ['endTimeSlider', 'endTimeValue', 1]
                            ];
                            advSliders.forEach(function(pair) {
                              var sDiv = document.getElementById(pair[0]);
                              var sVal = document.getElementById(pair[1]);
                              var sStart = pair[2];
                              if(sDiv && sVal && typeof noUiSlider !== 'undefined') {
                                if(sDiv.noUiSlider) {
                                  sDiv.noUiSlider.destroy();
                                }
                                noUiSlider.create(sDiv, {
                                  start: sStart,
                                  connect: 'lower',
                                  range: { min: 0, max: 1 },
                                  step: 0.01,
                                  tooltips: false,
                                  format: {
                                    to: function (value) { return value.toFixed(2); },
                                    from: function (value) { return parseFloat(value); }
                                  }
                                });
                                sDiv.noUiSlider.on('update', function(values, handle) {
                                  sVal.value = values[handle];
                                });
                                sVal.onchange = function() {
                                  var v = parseFloat(sVal.value);
                                  if(isNaN(v) || v < 0 || v > 1) {
                                    sVal.value = sDiv.noUiSlider.get();
                                    return;
                                  }
                                  v = Math.round(v * 100) / 100;
                                  sVal.value = v.toFixed(2);
                                  sDiv.noUiSlider.set(v);
                                };
                              }
                            });
                        } else {
                            panel.style.display = 'none';
                            btn.innerText = '▶';
                            btn.classList.remove('open');
                            panel.innerHTML = '';
                        }
                    };
                }
            }, 0);
            return;
        }
        // 室内设计分支
        if(idx === 0) {
            // 线稿出图、白模渲染：无上传+1提示词
            if(text === '线稿出图' || text === '白模渲染') {
                var title = text === '线稿出图' ? '室内-线稿出图' : '室内-白模渲染';
                footer.style.marginTop = '32px';
                footer.innerHTML =
                  '<div class="footer-title" style="font-size:22px;margin-bottom:32px;">' + title + '</div>' +
                  '<div class="ps-form-block" style="margin-bottom:16px;max-width:340px;min-width:260px;">' +
                  '  <label class="ps-form-label" for="promptInput">提示词</label>' +
                  '  <input type="text" class="ps-form-input" id="promptInput" value="' + text + '" style="width:100%;margin-top:6px;">' +
                  '</div>' +
                  '<div class="ps-form-block" id="strengthBlock" style="margin-bottom:16px;">' +
                  '  <label class="ps-form-label">控制强度</label>' +
                  '  <div class="ps-slider-row">' +
                  '    <span class="ps-slider-label">弱</span>' +
                  '    <div class="my-slider" id="strengthSlider"></div>' +
                  '    <span class="ps-slider-label">强</span>' +
                  '    <input type="text" class="ps-slider-value" id="sliderValue" value="0.55">' +
                  '  </div>' +
                  '</div>' +
                  '<div class="ps-form-block" style="margin-bottom:16px;">' +
                  '  <div class="ps-advance-row" style="display:flex;align-items:center;gap:8px;">' +
                  '    <label class="ps-form-label" style="font-weight:bold;margin-bottom:6px;">高级参数设置</label>' +
                  '    <button class="ps-advance-btn" id="advanceBtn"></button>' +
                  '  </div>' +
                  '  <div id="advancePanelContainer" style="display:none;margin-top:8px;padding:12px 8px;background:#222;border-radius:6px;"></div>' +
                  '</div>' +
                  '<div class="ps-form-block" style="margin-top:32px;text-align:center;">' +
                  '  <button class="ps-generate-btn" style="width:100%;max-width:320px;min-width:180px;margin:0 auto;display:block;">立即生成 ✨</button>' +
                  '</div>';
                // ...滑块和高级参数初始化...
                setTimeout(function() {
                    initFooterSliders();
                    // 这里没有上传区，不需要初始化
                }, 0);
                return;
            }
            // 多风格（白模）、多风格（线稿）：3图上传+3提示词
            if(text === '多风格（白模）' || text === '多风格（线稿）') {
                footer.style.marginTop = '32px';
                footer.innerHTML =
                  '<div class="footer-title" style="font-size:22px;margin-bottom:32px;">室内-' + text + '</div>' +
                  [1,2,3].map(function(i){
                    return '<div class="ps-form-block upload-section" style="margin-bottom:16px;max-width:340px;min-width:260px;">' +
                      '<div class="upload-header" style="font-size:16px;margin-bottom:8px;">参考图像'+i+
                      '  <span class="upload-switch" style="float:right;">' +
                      '    <button class="switch-btn active" id="customRefBtn'+i+'">自定义参考图</button>' +
                      '    <button class="switch-btn" id="libRefBtn'+i+'">参考图片库</button>' +
                      '  </span>' +
                      '</div>' +
                      '<div class="upload-box" style="background:#181818;border:1.5px dashed #444;border-radius:6px;min-height:120px;display:flex;align-items:center;justify-content:center;">' +
                      '  <input type="file" id="uploadInput'+i+'" style="display:none;" accept="image/*">' +
                      '  <div class="upload-placeholder" id="uploadPlaceholder'+i+'" style="text-align:center;width:100%;padding:18px 0;">' +
                      '    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;">' +
                      '      <span style="font-size:40px;color:#8fa0ff;">📷</span>' +
                      '      <span style="font-size:16px;color:#aaa;">拖放文件到此处上传</span>' +
                      '      <span style="font-size:13px;color:#666;">或点击选择文件</span>' +
                      '    </div>' +
                      '  </div>' +
                      '</div>' +
                      '</div>';
                  }).join('') +
                  [1,2,3].map(function(i){
                    return '<div class="ps-form-block" style="margin-bottom:16px;max-width:340px;min-width:260px;">' +
                      '  <label class="ps-form-label" for="promptInput'+i+'">提示词'+i+'</label>' +
                      '  <input type="text" class="ps-form-input" id="promptInput'+i+'" value="风格'+i+'，现代风格" style="width:100%;margin-top:6px;">' +
                      '</div>';
                  }).join('') +
                  '<div class="ps-form-block" id="strengthBlock" style="margin-bottom:16px;">' +
                  '  <label class="ps-form-label">控制强度</label>' +
                  '  <div class="ps-slider-row">' +
                  '    <span class="ps-slider-label">弱</span>' +
                  '    <div class="my-slider" id="strengthSlider"></div>' +
                  '    <span class="ps-slider-label">强</span>' +
                  '    <input type="text" class="ps-slider-value" id="sliderValue" value="0.55">' +
                  '  </div>' +
                  '</div>' +
                  '<div class="ps-form-block" style="margin-bottom:16px;">' +
                  '  <div class="ps-advance-row" style="display:flex;align-items:center;gap:8px;">' +
                  '    <label class="ps-form-label" style="font-weight:bold;margin-bottom:6px;">高级参数设置</label>' +
                  '    <button class="ps-advance-btn" id="advanceBtn"></button>' +
                  '  </div>' +
                  '  <div id="advancePanelContainer" style="display:none;margin-top:8px;padding:12px 8px;background:#222;border-radius:6px;"></div>' +
                  '</div>' +
                  '<div class="ps-form-block" style="margin-top:32px;text-align:center;">' +
                  '  <button class="ps-generate-btn" style="width:100%;max-width:320px;min-width:180px;margin:0 auto;display:block;">立即生成 ✨</button>' +
                  '</div>';
                setTimeout(function() {
                    initFooterSliders();
                    initAllUploadAreas();
                }, 0);
                return;
            }
            // 彩平图、毛坯房出图、风格转换、360出图：单图上传+1提示词
            if(text === '彩平图' || text === '毛坯房出图' || text === '风格转换' || text === '360出图') {
                footer.style.marginTop = '32px';
                footer.innerHTML =
                  '<div class="footer-title" style="font-size:22px;margin-bottom:32px;">室内-' + text + '</div>' +
                  '<div class="ps-form-block upload-section" style="margin-bottom:16px;max-width:340px;min-width:260px;">' +

            function updateBubble() {
              var val = parseFloat(slider.value).toFixed(2);
              bubble.innerText = val;
              var min = parseFloat(slider.min);
              var max = parseFloat(slider.max);
              var value = parseFloat(slider.value);
              var percent = (value - min) / (max - min);
              var sliderWidth = slider.offsetWidth;
              bubble.style.left = (percent * sliderWidth) + 'px';
            }
            slider.addEventListener('input', function() {
              bubble.style.display = 'block';
              updateBubble();
            });
            slider.addEventListener('change', function() {
              bubble.style.display = 'none';
            });
            slider.addEventListener('mouseleave', function() {
              bubble.style.display = 'none';
            });
            slider.addEventListener('mousedown', function() {
              bubble.style.display = 'block';
              updateBubble();
              slider.blur();
            });
            slider.addEventListener('mousemove', function() {
              if(bubble.style.display === 'block') updateBubble();
            });
          }

// 处理多风格上传区的事件绑定
function initMultiStyleUploads() {
    console.log('初始化多风格上传区');
    for(var i = 1; i <= 3; i++) {
        var uploadInput = document.getElementById('uploadInput' + i);
        var uploadPlaceholder = document.getElementById('uploadPlaceholder' + i);
        
        if(uploadInput && uploadPlaceholder) {
            console.log('绑定多风格上传区 ' + i);
            
            // 强制绑定点击事件
            uploadPlaceholder.onclick = function(e, index) {
                console.log('点击了多风格上传区 ' + index);
                document.getElementById('uploadInput' + index).click();
            }.bind(null, null, i);
            
            // 添加鼠标样式
            uploadPlaceholder.style.cursor = 'pointer';
            uploadPlaceholder.style.pointerEvents = 'auto';
            
            uploadInput.onchange = function(e, index) {
                console.log('多风格文件选择事件触发 ' + index);
                var file = e.target.files[0];
                if(file && file.type.startsWith('image/')) {
                    var reader = new FileReader();
                    reader.onload = function(ev) {
                        document.getElementById('uploadPlaceholder' + index).innerHTML = 
                            '<img src="' + ev.target.result + '" alt="预览" style="max-width:100%;max-height:80px;display:block;margin:auto;border-radius:4px;">';
                    };
                    reader.readAsDataURL(file);
                }
            }.bind(null, null, i);
        }
    }
}

// 通用上传区事件绑定函数
function initUploadArea(inputId, placeholderId) {
    var uploadInput = document.getElementById(inputId);
    var uploadPlaceholder = document.getElementById(placeholderId);
    
    if(uploadInput && uploadPlaceholder) {
        console.log('绑定上传区:', inputId, placeholderId);
        
        // 强制绑定点击事件
        uploadPlaceholder.onclick = function(e) {
            console.log('点击了上传区:', inputId);
            uploadInput.click();
        };
        
        // 添加鼠标样式
        uploadPlaceholder.style.cursor = 'pointer';
        uploadPlaceholder.style.pointerEvents = 'auto';
        
        uploadInput.onchange = function(e) {
            console.log('文件选择事件触发:', inputId);
            var file = e.target.files[0];
            if(file && file.type.startsWith('image/')) {
                var reader = new FileReader();
                reader.onload = function(ev) {
                    uploadPlaceholder.innerHTML = '<img src="' + ev.target.result + '" alt="预览" style="max-width:100%;max-height:80px;display:block;margin:auto;border-radius:4px;">';
                };
                reader.readAsDataURL(file);
            }
        };
        
        // 拖拽事件
        uploadPlaceholder.ondragover = function(e) {
            e.preventDefault();
            uploadPlaceholder.style.background = 'rgba(74,144,226,0.1)';
        };
        uploadPlaceholder.ondragleave = function(e) {
            e.preventDefault();
            uploadPlaceholder.style.background = '';
        };
        uploadPlaceholder.ondrop = function(e) {
            e.preventDefault();
            uploadPlaceholder.style.background = '';
            var file = e.dataTransfer.files[0];
            if(file && file.type.startsWith('image/')) {
                var reader = new FileReader();
                reader.onload = function(ev) {
                    uploadPlaceholder.innerHTML = '<img src="' + ev.target.result + '" alt="预览" style="max-width:100%;max-height:80px;display:block;margin:auto;border-radius:4px;">';
                };
                reader.readAsDataURL(file);
            }
        };
        
        return true;
    } else {
        console.log('未找到上传元素:', {
            inputId: inputId,
            placeholderId: placeholderId,
            uploadInput: !!uploadInput,
            uploadPlaceholder: !!uploadPlaceholder
        });
        return false;
    }
}

// 初始化所有上传区
function initAllUploadAreas() {
    console.log('开始初始化所有上传区');
    
    // 单图上传区
    initUploadArea('uploadInput', 'uploadPlaceholder');
    
    // 多风格上传区
    for(var i = 1; i <= 3; i++) {
        initUploadArea('uploadInput' + i, 'uploadPlaceholder' + i);
    }
    
    console.log('所有上传区初始化完成');
}

  var slider = document.getElementById(sliderId);
  var valueBox = document.getElementById(inputId);
  if(slider && valueBox) {
    slider.oninput = function() {
      valueBox.value = parseFloat(slider.value).toFixed(2);
    };
    valueBox.onchange = function() {
      var v = parseFloat(valueBox.value);
      if(isNaN(v) || v < 0 || v > 1) {
        valueBox.value = parseFloat(slider.value).toFixed(2);
        return;
      }
      v = Math.round(v * 100) / 100;
      valueBox.value = v.toFixed(2);
      slider.value = v;
    };
  }
}
// 每次渲染footer后都绑定
setTimeout(function(){
  bindSliderWithInput('strengthSlider', 'sliderValue');
}, 0);

function showCurrentView(base64) {
  var img = document.getElementById('currentViewImg');
  var preview = document.getElementById('currentViewPreview');
  if(img && preview) {
    if(base64 && base64.length > 100) {
      img.src = 'data:image/png;base64,' + base64;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  }
  // 自动填充上传区
  var uploadPlaceholder = document.getElementById('uploadPlaceholder');
  if(uploadPlaceholder && base64 && base64.length > 100) {
    uploadPlaceholder.innerHTML = '<img src="data:image/png;base64,' + base64 + '" alt="预览" style="max-width:100%;max-height:80px;display:block;margin:auto;pointer-events:auto;cursor:pointer;">';
    // 让点击图片也能重新上传
    var imgEl = uploadPlaceholder.querySelector('img');
    var uploadInput = document.getElementById('uploadInput');
    if(imgEl && uploadInput) {
      imgEl.onclick = function(e) {
        e.stopPropagation();
        uploadInput.click();
      };
      uploadPlaceholder.onclick = function() {
        uploadInput.click();
      };
    }
  }
}
